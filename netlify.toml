[build]
  command = "npm run test:public"
  publish = "dist-public"

[[headers]]
  for = "/*"

  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"

  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/angeltreeservices_backup_files/*"

  [headers.values]
    Cache-Control = "public, max-age=604800"
